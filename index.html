<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hallway Dash</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="960" height="540"></canvas>

    <div id="hud">
      <span id="score-display">0s</span>
      <span id="lives-display">❤️❤️❤️</span>
      <span style="display:flex;align-items:center;gap:10px">
        <span id="best-display">Best: 0s</span>
        <button id="mute-btn">🔊</button>
      </span>
    </div>

    <div id="title-screen" class="screen hidden"></div>
    <div id="gameover-screen" class="screen hidden"></div>
  </div>
  <script src="game.js"></script>
</body>
</html>
